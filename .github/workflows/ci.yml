name: Swag Labs Selenium CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Record start time ────────────────────────────────────────
      - name: Record start time
        id: start-time
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      # ── Build Docker image ───────────────────────────────────────
      - name: Build Docker image
        run: docker build -t swag-labs-selenium .

      # ── Run tests in Docker container ────────────────────────────
      - name: Run tests in Docker container
        run: |
          docker run --name swag-labs-test swag-labs-selenium || true

      # ── Copy reports from container ──────────────────────────────
      - name: Copy reports from container
        if: always()
        run: |
          docker cp swag-labs-test:/app/target/surefire-reports ./target/surefire-reports || true
          docker cp swag-labs-test:/app/target/allure-results ./target/allure-results || true

      # ── Compute duration ─────────────────────────────────────────
      - name: Compute duration
        id: duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.start-time.outputs.start }}
          DIFF=$((END - START))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          echo "value=${MINS}m ${SECS}s" >> $GITHUB_OUTPUT

      # ── Parse test results ───────────────────────────────────────
      - name: Parse test results
        id: results
        if: always()
        run: |
          REPORT_DIR="target/surefire-reports"

          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0
          FAILED_TESTS=""

          for f in $REPORT_DIR/TEST-*.xml; do
            [ -f "$f" ] || continue
            T=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1)
            FA=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            E=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1)
            SK=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1)

            TOTAL=$((TOTAL + ${T:-0}))
            FAILED=$((FAILED + ${FA:-0} + ${E:-0}))
            SKIPPED=$((SKIPPED + ${SK:-0}))

            while IFS= read -r line; do
              TESTNAME=$(echo "$line" | grep -oP 'name="\K[^"]+')
              CLASSNAME=$(echo "$line" | grep -oP 'classname="\K[^"]+')
              if [ -n "$TESTNAME" ] && [ -n "$CLASSNAME" ]; then
                FAILED_TESTS="$FAILED_TESTS\n• $CLASSNAME.$TESTNAME"
              fi
            done < <(grep -B1 "<failure" "$f" | grep "<testcase")
          done

          PASSED=$((TOTAL - FAILED - SKIPPED))

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(( (PASSED * 100) / TOTAL ))
          else
            PASS_RATE=0
          fi

          if [ "$FAILED" -gt 0 ]; then
            STATUS="FAILED"
          else
            STATUS="PASSED"
          fi

          echo "total=$TOTAL"         >> $GITHUB_OUTPUT
          echo "passed=$PASSED"       >> $GITHUB_OUTPUT
          echo "failed=$FAILED"       >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"     >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "status=$STATUS"       >> $GITHUB_OUTPUT

          echo "failed_tests<<EOF"    >> $GITHUB_OUTPUT
          echo -e "$FAILED_TESTS"     >> $GITHUB_OUTPUT
          echo "EOF"                  >> $GITHUB_OUTPUT

      # ── Upload surefire reports ──────────────────────────────────
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      # ── Upload Allure results ────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 7

      # ── Build Slack message ──────────────────────────────────────
      - name: Build Slack message
        id: slack-message
        if: always()
        run: |
          if [ "${{ steps.results.outputs.failed }}" -gt 0 ]; then
            STATUS_TEXT="❌ FAILED"
            CLEAN_TESTS=$(echo "${{ steps.results.outputs.failed_tests }}" \
              | tr '\n' ' ' \
              | sed 's/• /| /g' \
              | sed 's/^[[:space:]]*//' \
              | sed 's/[[:space:]]*$//')
            TESTS_TEXT=":x: Failed Tests: $CLEAN_TESTS"
          else
            STATUS_TEXT="✅ PASSED"
            TESTS_TEXT="✅ All tests passed"
          fi
          echo "status_text=${STATUS_TEXT}" >> $GITHUB_OUTPUT
          echo "tests_text=${TESTS_TEXT}"   >> $GITHUB_OUTPUT

      # ── Slack notification ───────────────────────────────────────
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Swag Labs Selenium Test Report"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ steps.slack-message.outputs.status_text }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Pass Rate:*\n${{ steps.results.outputs.pass_rate }}%"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Duration:*\n${{ steps.duration.outputs.value }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":bar_chart: *Test Results Summary*\nTotal: ${{ steps.results.outputs.total }} | Passed: ${{ steps.results.outputs.passed }} | Failed: ${{ steps.results.outputs.failed }} | Skipped: ${{ steps.results.outputs.skipped }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":link: *Links*\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>\n• <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View Commit>"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.slack-message.outputs.tests_text }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Repository: ${{ github.repository }} | Run #${{ github.run_number }} | Triggered by: ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── Email notification ───────────────────────────────────────
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: Swag Labs CI <${{ secrets.EMAIL_USERNAME }}>
          subject: "[${{ steps.results.outputs.status }}] Swag Labs Selenium — Run #${{ github.run_number }}"
          html_body: |
            <html>
            <body style="font-family: Arial, sans-serif; padding: 20px;">
              <h2 style="color: ${{ steps.results.outputs.status == 'PASSED' && '#0D9F6E' || '#F05251' }}">
                Swag Labs Selenium Test Report
              </h2>
              <table style="border-collapse: collapse; width: 100%; max-width: 600px;">
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Status</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd; color: ${{ steps.results.outputs.status == 'PASSED' && '#0D9F6E' || '#F05251' }}">
                    <strong>${{ steps.results.outputs.status }}</strong>
                  </td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Pass Rate</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd;">${{ steps.results.outputs.pass_rate }}%</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Duration</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd;">${{ steps.duration.outputs.value }}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Branch</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd;">${{ github.ref_name }}</td>
                </tr>
              </table>

              <h3>&#128202; Test Results Summary</h3>
              <table style="border-collapse: collapse; width: 100%; max-width: 600px;">
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Total</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd;">${{ steps.results.outputs.total }}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Passed ✅</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd; color: #0D9F6E;">${{ steps.results.outputs.passed }}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Failed ❌</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd; color: #F05251;">${{ steps.results.outputs.failed }}</td>
                </tr>
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd;"><strong>Skipped ⏭</strong></td>
                  <td style="padding: 8px; border: 1px solid #ddd;">${{ steps.results.outputs.skipped }}</td>
                </tr>
              </table>

              <h3>&#128279; Links</h3>
              <p>
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run</a> |
                <a href="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}">View Commit</a>
              </p>

              ${{ steps.results.outputs.failed > 0 && format('<h3 style="color: #F05251;">❌ Failed Tests</h3><pre style="background:#fff0f0;padding:10px;border-radius:4px;">{0}</pre>', steps.results.outputs.failed_tests) || '<p style="color: #0D9F6E;">✅ All tests passed</p>' }}

              <p style="color: #666; font-size: 12px;">
                Repository: ${{ github.repository }} | Run #${{ github.run_number }} | Triggered by: ${{ github.actor }}
              </p>
            </body>
            </html>
